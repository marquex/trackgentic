# Project Status
# Current state, roadmap, open questions, and risks.

current_state:
  phase: pre-implementation
  source_code: none — no package.json, tsconfig.json, or src/ directory exists
  documentation: complete — all 5 doc files are thorough and implementation-ready
  agentic_infra: complete — .claude/ agents, skills, hooks, and expertise system working
  last_updated: "2026-05-10"

implementation_roadmap:
  phase_1_foundation:
    description: "Core library setup and basic issue CRUD"
    tasks:
      - "Initialize npm project (package.json, tsconfig.json, bunfig.toml)"
      - "Define TypeScript types and interfaces for all data structures"
      - "Implement .trackgentic/ resolution algorithm (directory walking)"
      - "Implement init command (create .trackgentic/ structure)"
      - "Implement event append and replay engine"
      - "Implement index file management (sorted insert, binary search, update)"
      - "Implement create command"
      - "Implement list command (filtering from index)"
      - "Implement view command (event replay for computed state)"
      - "Implement update command"
      - "Implement history command"
      - "Wire CLI entry point (bin field in package.json)"
    estimated_complexity: high — foundational, everything depends on this

  phase_2_comments_and_auth:
    description: "Comment management and user authentication"
    tasks:
      - "Implement user registry (register, list, revoke, regenerate)"
      - "Implement auth middleware (token resolution, mode enforcement)"
      - "Implement comments add/update/delete/list"
      - "Add author field to all mutating events"
    estimated_complexity: medium — builds on phase 1 patterns

  phase_3_hierarchy:
    description: "Issue hierarchy with status constraints"
    tasks:
      - "Implement childrenOf map maintenance in index"
      - "Implement upward constraint: auto-promotion on child status advance"
      - "Implement downward constraint: block parent closure with open children"
      - "Implement downward cascade: auto-close done children on parent close"
      - "Implement reparenting logic"
    estimated_complexity: high — bidirectional tree constraints are tricky

  phase_4_blockages:
    description: "Dependency tracking and blockage management"
    tasks:
      - "Implement dependencies.json bidirectional map management"
      - "Implement blockages add/resolve/delete/list"
      - "Implement cycle detection (transitive graph walk)"
      - "Implement batch atomicity for blockage operations"
      - "Implement auto-resolution when blocker reaches done/closed"
      - "Add impact score to sort order"
    estimated_complexity: high — graph algorithms, atomicity, cascading

  phase_5_polish_and_distribution:
    description: "Testing, documentation, and npm publishing"
    tasks:
      - "Comprehensive test suite"
      - "README and API documentation"
      - "npm package configuration (bin, files, exports)"
      - "CI/CD setup"
    estimated_complexity: medium

open_questions:
  - id: OQ-001
    question: "Where should technical specs be written?"
    options: [".agentic/specs/", "docs/specs/", "specs/"]
    status: unresolved
    notes: "Need a location for implementation specs that subordinate agents can read"

  - id: OQ-002
    question: "Should we have a programmatic API in addition to CLI?"
    context: "Docs only describe CLI, but as an npm library, consumers may want to import directly"
    status: unresolved
    notes: "Likely yes — CLI can be a thin wrapper over a core library API"

  - id: OQ-003
    question: "Should the library handle concurrent file access?"
    context: "Multiple agents writing to same files simultaneously"
    status: unresolved
    notes: "File-level locking? Atomic writes? May not be needed for MVP"

  - id: OQ-004
    question: "Should we add a CLAUDE.md at project root?"
    context: "claude-developer noted this as an open question"
    status: unresolved
    notes: "Useful for onboarding but not blocking implementation"

risks:
  - id: RSK-001
    risk: "File corruption from concurrent agent writes"
    severity: medium
    mitigation: "Atomic write patterns (write to temp, rename). May add file locking later."
    status: acknowledged

  - id: RSK-002
    risk: "Index getting out of sync with issue files"
    severity: high
    mitigation: "Index updates must be atomic with issue file writes. Defensive reads should validate."
    status: acknowledged

  - id: RSK-003
    risk: "Status cascade performance with deep hierarchies"
    severity: low
    mitigation: "Agent trackers unlikely to have deep trees. Can optimize later if needed."
    status: acknowledged

  - id: RSK-004
    risk: "Cycle detection performance with many blockages"
    severity: low
    mitigation: "Only active entries checked. Agent-scale graphs are small."
    status: acknowledged

architectural_notes:
  - "The two-event creation pattern (creation event + update event with initial properties) is intentional — it simplifies state reconstruction since update events always carry the full property changes"
  - "The 'system' author for auto-promotion events is distinct from user-authored events — this is important for audit trails"
  - "Comment IDs need a generation strategy — docs don't specify the format, but should follow a similar pattern to issue IDs"
  - "The batch blockage operations (multiple --by args) need careful ordering for cycle detection against projected state"
