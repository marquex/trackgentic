# Design Decisions
# Key architectural choices made in the docs and their rationale.

decisions:
  - id: DD-001
    title: "File-backed storage instead of database"
    choice: "All data stored as JSON files in .trackgentic/ directory"
    rationale:
      - "Zero infrastructure — no database to install, run, or maintain"
      - "Git-native — entire tracker state is version-controlled alongside code"
      - "Conflict-resistant — separate files per issue, separate dependency index"
      - "Agent-friendly — agents can read/write files directly if needed"
      - "Portable — works in any directory, any repo, any machine"
    tradeoffs:
      - "No concurrent write safety beyond file-level (acceptable for agent usage)"
      - "Scalability limited by file count (acceptable — agent trackers are small)"
    status: decided

  - id: DD-002
    title: "Event sourcing for issue state"
    choice: "Issues are append-only event logs; state computed by replay"
    rationale:
      - "Full audit trail — every change is recorded and traceable"
      - "No data loss — updates never overwrite, only append"
      - "Git-friendly — append-only means fewer merge conflicts"
      - "Debuggable — agents can inspect history to understand how an issue evolved"
    tradeoffs:
      - "Read performance requires replaying events (mitigated by index for listing)"
      - "Event files grow over time (acceptable for agent-scale usage)"
    status: decided

  - id: DD-003
    title: "Sorted index with binary search"
    choice: "Index arrays sorted by issue ID (which is time-sortable)"
    rationale:
      - "O(log n) lookup by ID without reading issue files"
      - "ID encodes creation time, so sort is natural and free"
      - "Efficient listing and filtering from index alone"
    tradeoffs:
      - "Insertion requires finding correct position (O(log n) with binary search)"
      - "Index must be kept in sync with issue files"
    status: decided

  - id: DD-004
    title: "Issue ID format: timestamp + random"
    choice: "Date.now().toString(36).slice(0,6) + Math.random().toString(36).slice(-4)"
    rationale:
      - "10 characters — short enough to use in CLI arguments"
      - "Time-sortable — natural ordering reflects creation order"
      - "Collision-resistant — 36^4 randomness per millisecond slot"
      - "Human-readable — easier to work with than UUIDs"
    tradeoffs:
      - "Not globally unique like UUID (acceptable for per-repo scope)"
      - "Timestamp portion leaks creation timing (not a concern here)"
    status: decided

  - id: DD-005
    title: "Separate dependency index file"
    choice: "Blockages in dependencies.json, not in index.json"
    rationale:
      - "Reduces git conflict surface — agents modifying blockages don't conflict with those modifying issue metadata"
      - "Dependency data has different access patterns (bidirectional lookups)"
      - "Keeps index.json focused on issue metadata"
    status: decided

  - id: DD-006
    title: "Directory-walking resolution for .trackgentic/"
    choice: "Walk up from cwd to find .trackgentic/ folder"
    rationale:
      - "Monorepo support — different subdirectories can have independent trackers"
      - "Familiar pattern (like .git, .eslintrc, tsconfig.json resolution)"
      - "No configuration needed — just run commands from anywhere in the repo"
    status: decided

  - id: DD-007
    title: "Lightweight token auth (not cryptographic)"
    choice: "Simple tk_ prefixed tokens stored in users.json"
    rationale:
      - "Practical attribution, not security — goal is knowing who did what"
      - "Zero setup — no OAuth, no JWT, no external service"
      - "Agent-friendly — set env var once per session"
      - "Configurable strictness — open/read-only/strict modes fit different needs"
    tradeoffs:
      - "Not secure against intentional impersonation (by design — not the goal)"
      - "Tokens stored in plaintext in users.json (acceptable for non-sensitive use)"
    status: decided

  - id: DD-008
    title: "Hierarchy status constraint propagation"
    choice: "Upward auto-promotion + downward cascade with hard blocks"
    rationale:
      - "Keeps subtree lifecycle coherent — can't mark parent done with open children"
      - "Auto-promotion reduces manual bookkeeping — child starting work promotes parent"
      - "Downward cascade on close is intuitive — closing an epic closes its done stories"
      - "Hard blocks prevent inconsistent states"
    tradeoffs:
      - "Status changes can cascade across multiple files (performance consideration)"
      - "Complexity in implementation — need to walk tree in both directions"
    status: decided

  - id: DD-009
    title: "TypeScript with Bun runtime"
    choice: "TypeScript source, Bun for runtime and tooling"
    rationale:
      - "TypeScript for type safety and good DX in library code"
      - "Bun for fast execution, native TypeScript support, built-in test runner"
      - "npm distribution makes it accessible to any Node/Bun project"
    status: decided

  - id: DD-010
    title: "CLI as primary interface with JSON output"
    choice: "All output as JSON to stdout, errors as JSON to stderr"
    rationale:
      - "Machine-parseable — agents and scripts can consume output directly"
      - "No formatting ambiguity — structured data is unambiguous"
      - "Composable — pipe into jq, other tools, or agent parsers"
      - "stderr/stdout split allows filtering output from errors"
    status: decided

  - id: DD-011
    title: "Monorepo with library and UI packages"
    choice: "Bun workspaces monorepo with packages/library and packages/ui"
    rationale:
      - "Shared development workflow — single repo, single set of tooling"
      - "UI can import library directly as a workspace dependency"
      - "Library is independent — can be published and used without UI"
      - "Bun workspaces are simple and require minimal config"
    tradeoffs:
      - "Slightly more complex CI/CD (two packages to build/test)"
      - "Need to be disciplined about not coupling UI into library"
    status: decided

  - id: DD-012
    title: "Tracker class as single programmatic API entry point"
    choice: "All business logic in a Tracker class; CLI is a thin wrapper calling Tracker methods"
    rationale:
      - "CLI and API are interchangeable — same JSON objects returned"
      - "UI can import Tracker directly without shelling out to CLI"
      - "Single implementation to test — CLI tests only verify arg parsing and output"
      - "Clear separation of concerns — Tracker owns logic, CLI owns I/O"
    tradeoffs:
      - "Tracker class may become large (mitigated by delegating to core modules)"
    status: decided

  - id: DD-013
    title: "Commander for CLI argument parsing"
    choice: "Use commander package for argument parsing"
    rationale:
      - "Battle-tested, well-typed, lightweight"
      - "Handles subcommands, flags, variadic args naturally"
      - "Only runtime dependency besides Bun/Node built-ins"
    tradeoffs:
      - "Adds one dependency (acceptable — widely used, stable)"
    status: decided

  - id: DD-014
    title: "Prettier + ESLint for formatting and linting"
    choice: "Use Prettier for formatting and ESLint with TypeScript plugin for linting, replacing Biome"
    rationale:
      - "Biome caused recurring friction — conflicts with strict TypeScript flags (noPropertyAccessFromIndexSignature vs UseLiteralKeys), cognitive complexity false positives, and configuration overhead"
      - "Prettier is the industry standard for formatting — zero config, opinionated, no debates"
      - "ESLint with typescript-eslint has first-class TypeScript support — understands types, no false positives from strict TS flags"
      - "Faster development cycle — fewer tool conflicts means less time debugging linter config"
    tradeoffs:
      - "Two tools instead of one (acceptable — both are well-established and complementary)"
      - "ESLint is slightly slower than Biome (acceptable — still fast enough for this codebase size)"
    status: decided
    decided_date: "2026-05-10"
    replaces: "DD-014 originally chose Biome, replaced after recurring friction during Phase 3"

  - id: DD-015
    title: "tsup for npm build pipeline"
    choice: "Use tsup to compile TypeScript source to distributable npm package (ESM + CJS + .d.ts + CLI binary)"
    rationale:
      - "Purpose-built for TypeScript library builds — single tool for library output + CLI binary"
      - "Generates dual ESM/CJS automatically — works for both Node.js and Bun consumers"
      - "Built-in .d.ts generation — type declarations shipped without extra config"
      - "CLI binary bundled as standalone (includes commander) — zero-dep executable"
      - "Preserves per-file structure for library output — enables tree-shaking by consumers"
      - "Built on esbuild — very fast, Bun-friendly toolchain"
      - "Replaces shipping raw TypeScript source which only worked for Bun consumers"
    tradeoffs:
      - "Adds a build step (acceptable — standard for npm packages)"
      - "Need to verify Node.js compatibility in source (replace Bun.file/Bun.write with node:fs)"
      - "CLI shebang changes from #!/usr/bin/env bun to #!/usr/bin/env node"
    alternatives_considered:
      - "tsc alone — no CJS output, no bundling for CLI, more manual config"
      - "bun build — bundles to single file (bad for library tree-shaking), no .d.ts"
      - "Ship raw TS — only works for Bun consumers, excludes most npm users"
    status: decided
    decided_date: "2026-05-11"

  - id: DD-016
    title: "TypeDoc HTML for API documentation"
    choice: "Use TypeDoc's default HTML output for publishable API docs, keep markdown plugin as secondary output"
    rationale:
      - "Already installed and configured — typedoc.json exists, docs:check passes"
      - "All public exports already have comprehensive JSDoc (Phase 7)"
      - "Default HTML theme is clean, searchable, and standard for TS libraries"
      - "Can publish directly to GitHub Pages"
      - "Keep typedoc-plugin-markdown for embedding in VitePress or other doc sites later"
    tradeoffs:
      - "Default theme is functional but not highly styled (acceptable — can upgrade theme later)"
      - "API docs only — guides/tutorials would need a separate tool (VitePress) in the future"
    alternatives_considered:
      - "typedoc-plugin-markdown only — no standalone HTML site, harder to publish"
      - "VitePress — great for guides but doesn't auto-generate from JSDoc"
      - "Docusaurus — same limitation, heavier setup"
    status: decided
    decided_date: "2026-05-11"

  - id: DD-017
    title: "Dogfooding: trackgentic tracks its own development"
    choice: "Use trackgentic as the issue tracker for developing trackgentic itself"
    rationale:
      - "Real-world validation — every feature is tested by actual usage, not just unit tests"
      - "Dogfooding surfaces UX issues early — if the tool is annoying to use, we feel it immediately"
      - "Living documentation — the .trackgentic/ directory in the repo serves as a real example"
      - "No external dependency — we don't need GitHub Issues or Jira to track our own work"
    implementation:
      - "CLI linked globally via `npm link` from packages/library/ — trackgentic command resolves to local build"
      - "Issues stored in .trackgentic/ at repo root (not inside packages/library/)"
      - "Workflow: make code changes → `bun run build` in packages/library/ → `trackgentic` picks up fresh build"
    tradeoffs:
      - "Bootstrap paradox — need a working version to track work on making it work (mitigated: Phase 7 is already complete)"
      - "Build step required between code changes and CLI usage (acceptable — fast build with tsup)"
    status: decided
    decided_date: "2026-05-12"
