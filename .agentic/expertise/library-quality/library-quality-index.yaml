learnings:
  biome:
    - "Biome 2.x uses different config format than 2.0.0 schema. Use `biome migrate --write` to auto-migrate config."
    - "`organizeImports` was renamed to `assist.actions.source.organizeImports` in Biome 2.x."
    - "`noVar` rule was moved from `style` to `suspicious` in Biome 2.x."
    - "Some fixes are 'unsafe' and require `--unsafe` flag with `--write`."
    - "`noNonNullAssertion` rule catches `!` operator usage — use proper null checks instead."
  bun_coverage:
    - "Bun's `coverageThreshold` in bunfig.toml applies per-file, not just overall."
    - "file-io.ts has 61.90% coverage (below 80%) due to untested error paths in atomicWriteJSON."
    - "Set coverageThreshold to 0 to report coverage without failing the test run on per-file thresholds."
  typescript:
    - "The 4 extra strict flags (noUncheckedIndexedAccess, exactOptionalPropertyTypes, noImplicitOverride, noPropertyAccessFromIndexSignature) did NOT cause any typecheck errors in current code."
    - "Current code uses `as const` patterns and explicit typing that's already compatible with strict flags."
  typedoc:
    - "TypeDoc with typedoc-plugin-markdown parses all source files without errors."
    - "The `--emit none` flag is useful for CI validation without generating files."

