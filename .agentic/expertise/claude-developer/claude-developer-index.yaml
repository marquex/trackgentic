# Claude Developer Expertise Index
# Agent: claude-developer
# Domain: Claude Code extensions — agents, skills, hooks, configuration

project_overview:
  name: trackgentic
  type: Agentic infrastructure project
  description: Project building a multi-agent system using Claude Code's extension points
  claude_setup_root: .claude/

architecture:
  agents:
    path: .claude/agents/
    current_agents:
      - name: claude-developer
        model: opus
        description: Expert for developing Claude Code extensions (this agent)
        access: [.claude/**, .agentic/specs/engineering/**, .agentic/expertise/**]
        subordinates: none
        skills: [claude-developing, agent-expertise]
      - name: cto
        model: opus
        description: Chief Technology Officer — designs architecture, generates specs, tracks development alignment
        access: [.agentic/expertise/cto/**, ./**]
        subordinates: [library-developer, library-quality]
        skills: [agent-expertise, trackgentic, trackgentic-implement, issue]
        hooks: [enforce-agent-access.ts, expertise.hook.ts (Stop)]
      - name: library-developer
        model: opus
        description: TypeScript library developer — owns all technical details of the npm-published library
        access: [.agentic/expertise/library-developer/**, packages/library/**, .agentic/specs/**]
        subordinates: none
        skills: [agent-expertise, trackgentic, trackgentic-implement]
        hooks: [enforce-agent-access.ts, expertise.hook.ts (Stop)]
        manager: cto
      - name: library-quality
        model: opus
        description: Library quality engineer — generates tests, verifies code quality, produces documentation for the library
        access: [.agentic/expertise/library-quality/**, packages/library/**, .agentic/specs/**]
        subordinates: none
        skills: [agent-expertise, trackgentic, trackgentic-implement]
        hooks: [enforce-agent-access.ts, expertise.hook.ts (Stop)]
        manager: cto
    notes: |
      hire-expert skill tested — workflow is: parse → ask → confirm → create → validate. Step-by-step approach works well.
      Second hire (library-developer) went smoothly — user provided complete info upfront, only changed model from sonnet to opus.
      Third hire (library-quality) — user again provided complete info upfront, changed model from sonnet to opus. This agent needs Write/Edit tools (creates test files and docs).
      CTO now has two subordinates — adding the second was simple since trackgentic-based task assignment and Coordinating Work section already existed, just needed subordinates list update in frontmatter.

  skills:
    path: .claude/skills/
    current_skills:
      - name: claude-developing
        purpose: Access official Claude Code docs and custom conventions for extension development
        has_scripts: true
        scripts: [update-docs.ts]
        docs_cache: .claude/skills/claude-developing/docs/original/
        custom_docs: .claude/skills/claude-developing/docs/custom/
      - name: agent-expertise
        purpose: Teach agents how to manage long-term memory (expertise YAML files)
        has_scripts: true
        scripts: [expertise.hook.ts, yaml-validator.ts]
        hooks_registered_in: agent frontmatter only (SessionStart, UserPromptSubmit, Stop)
        injection_flow: SessionStart is primary injection point; UserPromptSubmit is fallback (skips if SessionStart already injected via flag check). Flag-based dedup handles double-firing gracefully.
        stop_flow: Stop hook in agent frontmatter fires reliably for all agent sessions including -p mode. Handles both Stop and SubagentStop events.
      - name: hire-expert
        purpose: Create new expert agents with proper hierarchy, access rules, and expertise setup
        has_scripts: false
        notes: Template-based agent creation with hierarchy integration
      - name: trackgentic-implement
        purpose: Pick up an assigned issue, implement it, and hand it back via trackgentic status transitions
        has_scripts: false
        notes: |
          Unified skill for all agents. CTO uses it for high-level planning (delegates to /issue skill).
          Workers use it for the implementation flow (retrieve, validate, implement, hand back).
          The runner invokes agents with `/trackgentic-implement <issue-id>`.
      - name: trackgentic
        purpose: Interact with the trackgentic issue tracker — create, list, view, update issues, comments, users, blockages
        has_scripts: false
        auth_mechanism: Token looked up from .trackgentic/users.json by enforce-trackgentic-token.ts hook and injected as TRACKGENTIC_USER_TOKEN env var — agents call trackgentic directly without token prefix
        notes: |
          Pure reference skill — no scripts, just CLI usage documentation.
          Each agent should be registered via `trackgentic users register <name>` to get their own token.
          The PreToolUse hook reads users.json, matches agent_type to user name, strips any manual token from the command, and injects the correct one.
          Agents do NOT need to provide tokens manually. The $TRACKGENTIC_TOKEN constant in agent system files is informational only.
      - name: issue
        purpose: Manager planning skill — analyze a request, draft spec, create review + implementation + quality tasks with blockages
        has_scripts: false
        notes: |
          Used by CTO to plan new features. Creates everything upfront: spec, review tasks, implementation tasks,
          quality validation tasks, with proper blockages so the flow runs automatically through the agent runner.
          Creates all tasks in one invocation — no re-engagement needed between phases.

  hooks:
    path: .claude/hooks/
    current_hooks:
      - name: enforce-agent-access.ts
        trigger: PreToolUse (Read|Write|Edit|MultiEdit|Bash) — per-agent frontmatter
        purpose: Enforce per-agent filesystem access from frontmatter
        key_behaviors:
          - Main agent (no agent_type) is always allowed
          - No access block in agent file = deny (fail closed)
          - Auto-allows agents reading their own agent file
          - Maps tools to verbs: Read/Grep/Glob=read, Write/Edit/MultiEdit/NotebookEdit=write
          - Bash commands classified by patterns (redirection, rm, cp, etc.)
      - name: enforce-trackgentic-token.ts
        trigger: PreToolUse (Bash(trackgentic *)) — project-wide in settings.json
        purpose: Ensure agents use their own registered trackgentic token when calling the CLI
        key_behaviors:
          - Main agent (no agent_type) is always allowed without modification
          - Looks up token from .trackgentic/users.json by matching agent_type against user name
          - If agent not found in users.json → deny with registration instructions
          - Strips any existing TRACKGENTIC_TOKEN or TRACKGENTIC_USER_TOKEN from the command
          - Injects the looked-up token via updatedInput: TRACKGENTIC_USER_TOKEN="<token>" <command>
          - Agents do NOT need to know or provide their own tokens — the hook handles everything transparently
      - name: enforce-issue-cleanup.ts
        trigger: SubagentStop — project-wide in settings.json
        purpose: Prevent agents from stopping with unblocked active issues assigned to them
        key_behaviors:
          - Lists open issues assigned to the agent via trackgentic
          - Filters for todo/in-progress status
          - Checks blockages for each active issue
          - Blocks stop if any unblocked active issues remain
          - Forces agent to resolve issues (mark done, reassign, or add blockages) before exiting
      - name: inject-agent-markers.ts
        trigger: PostToolUse (after Read)
        purpose: Expand <!-- ACCESS_RULES --> and <!-- SUBORDINATES --> markers in agent files at runtime
        key_behaviors:
          - Only activates when Read tool reads a file in .claude/agents/
          - File on disk is NEVER modified — markers persist and expand in memory
          - Reads subordinate agent files to get descriptions for SUBORDINATES expansion
  settings:
    path: .claude/settings.json
    hooks_configured:
      PreToolUse: [enforce-trackgentic-token.ts (Bash(trackgentic *))]
      SubagentStop: [enforce-issue-cleanup.ts]
      PostToolUse: [inject-agent-markers.ts]
    permissions:
      allow: [Bash(bun .claude/hooks/*), Bash(bun .claude/skills/**), Write/Edit/MultiEdit on .claude/**]
    env:
      BASH_DEFAULT_TIMEOUT_MS: "1800000"
      BASH_MAX_TIMEOUT_MS: "1800000"

  expertise_system:
    path: .agentic/expertise/{agent-name}/
    index_file: "{agent-name}-index.yaml"
    management_hook: expertise.hook.ts (in agent-expertise skill, wired in each agent's frontmatter)
    conventions:
      - YAML structured files, max 600 lines per file, max 300 chars per line
      - Validate with: bun yaml-validator (requires js-yaml dependency)
      - Index file injected at session start, update check at session stop

conventions:
  - All hooks use bun runtime (TypeScript, no build step)
  - Agent frontmatter uses custom YAML parser (no yaml dependency) in enforce-agent-access
  - Agent marker expansion (ACCESS_RULES, SUBORDINATES) never modifies files on disk
  - Skills with scripts have a scripts/ folder
  - Task assignment uses trackgentic issues — managers create and assign issues, the agent runner picks them up and launches agents
  - The agent runner uses `claude --agent <name> -p "/trackgentic-implement <issueId>"` — this is a separate top-level process, NOT a subagent, so Stop fires (not SubagentStop)
  - The intended issue flow is: (1) user invokes CTO directly with `/issue "description"` in an interactive session, (2) CTO creates spec + all trackgentic issues with blockages, (3) user runs `run-agents.ts` separately, (4) runner dispatches workers who complete everything automatically through blockage chains
  - Project-wide enforcement hooks (token, issue cleanup) are in .claude/settings.json — they apply to all agents automatically
  - Agent-specific hooks (access, expertise) are in each agent's frontmatter — they apply only to that agent
  - Internal subagents (Agent tool / @-mention) only run frontmatter hooks — settings.json hooks don't fire inside them
  - Avoid MCP — prefer CLI tools via skills
  - Only one CLAUDE.md at project root, used as project overview not agent memory
  - Expert agents always get agent-expertise skill and PreToolUse hook for access enforcement
  - Agent hierarchy is a strict tree — task assignment flows downward via trackgentic issues

patterns:
  - hire-expert flow: parse user description → identify gaps → ask follow-ups → present summary → await explicit confirmation → create files → validate
  - For CTO-type roles: start with read-only repo access, add write folders when specs location is decided
  - Agent creation is multi-step — always confirm before writing files, user may adjust access or hierarchy
  - Users often override the default model (sonnet) — always present model in confirmation summary so it's visible and adjustable
  - Second hire (library-developer) — user provided all info upfront in a single description; only change was model (sonnet → opus). When user gives complete info, skip directly to confirmation step.
  - When adding first subordinate to a manager: add the `issue` skill to the manager, add subordinates list, add Coordinating Work section before Restricted domain section
  - When adding subsequent subordinates to a manager that already has the `issue` skill and Coordinating Work section: just add to subordinates list in frontmatter — no structural changes needed
  - Agents that create files (tests, docs) need Write/Edit in their tools list — most expert agents are read-only but quality/doc agents are exceptions
  - Reference-only skills (no scripts): SKILL.md frontmatter just needs `name` and `description`, no `allowed-tools` or `argument-hint` needed. The body is purely instructional — teaches the agent how to use an external CLI tool, API, or convention. The trackgentic skill is the first example of this pattern.
  - PreToolUse updatedInput is powerful for transparent command modification: the hook can modify tool_input (e.g. inject env vars into Bash commands) without the agent needing to know. Combined with permissionDecision: "allow", the tool call proceeds with the modified input seamlessly. This is better than requiring agents to manually include the right values.
  - Token injection pattern: the hook reads .trackgentic/users.json (not env var) to find the agent's token by name, strips any manual token from the command, and injects the correct one via updatedInput. The agent system files have $TRACKGENTIC_TOKEN as an informational-only constant. The SKILL.md tells agents "just call trackgentic directly" and explains the hook handles auth transparently.
  - Agent runner lifecycle observed end-to-end: runner polls `trackgentic next <agent>` → dispatches to free agents → agents process (read spec, analyze code, post comments, update expertise) → agents close issues → blockers auto-resolve → parent auto-promotes to done. The entire flow from poll to all-done worked correctly with no manual intervention.
  - Upfront task creation pattern: the /issue skill should create ALL tasks (reviews + implementation + quality) in one invocation with proper blockages, so the runner can process them in sequence without requiring CTO re-engagement between phases. This avoids the "multi-phase re-engagement" failure mode where the CTO never gets re-dispatched.
  - Skill consolidation: replaced worktask + trackgentic-manager + trackgentic-subordinate (3 skills with broken references) with a single trackgentic-implement skill (all agents) + issue skill (CTO only). Fewer skills = fewer broken references.
  - When monitoring running agents: check session log line counts for growth, parse tail lines for agent activity (tool calls = working, text output = thinking/reporting, result event = finished). Agent sessions typically take 3-5 min for review tasks, 20-26 turns.

gotchas:
  - No package.json in .claude/ directory — yaml-validator.ts imports js-yaml which needs install at runtime
  - yaml-validator.ts takes a directory path (not a file path) — it recursively finds all YAML files in the given directory
  - Expertise injection was only handled on UserPromptSubmit, not SessionStart — subagents via agent runner (claude -p) need SessionStart injection since that's the primary context injection point before the first prompt
  - Expertise hooks (SessionStart, UserPromptSubmit, Stop) live in agent frontmatter, NOT settings.json — settings.json hooks don't reliably fire for -p mode subagents
  - hire-expert skill template includes all three expertise hooks in the frontmatter — new agents get them automatically
  - "TYPOS IN HOOK COMMANDS ARE SILENTLY FATAL — if a hook command references a non-existent file, bun fails with a non-zero exit code, producing a 'hook error' notification. The hook never executes. Since there's no compile-time checking on command strings, always double-check paths after editing agent frontmatter hook commands."
  - "stop-hook-error notification appears in --verbose stream-json output for ALL agents when their Stop hook returns decision: block — this is normal Claude Code behavior, not a bug. The hook works correctly (feedback is passed, agent continues), but the notification is always emitted."
  - "CLI skill docs must match actual `--help` output exactly — agents follow the syntax literally. When the skill shows `<title>` as a positional arg but doesn't explicitly say 'do NOT use --title', agents may try `--title` and fail. Always use concrete examples with real values (e.g. `create \"My issue title\"`) instead of placeholders like `<title>`, and add explicit warnings about common misinterpretations."
  - "When writing CLI reference skills, always verify syntax against `--help` output (run `<tool> <command> --help`). Don't trust existing docs or README — they may be outdated or use a different CLI version. This is the single source of truth for option names, positional vs flag args, and variadic syntax."
  - "Skill docs for tools with mixed positional/flag args need extra clarity. Example: `trackgentic create` takes title as positional but `trackgentic update` uses `--title` as a flag. Agents will conflate these. Use concrete example commands and add explicit notes like 'title is positional, NOT a flag'."
  - "When a skill has duplicated/overlapping workflow sections (copy-paste drift), agents get confused by contradictory instructions. Consolidate into a single authoritative flow. The trackgentic skill had 3 overlapping versions of the workflow — merged into one clean sequence."
  - "Blockages `--by` is variadic (`--by id1 id2`) — when documenting variadic options, add an explicit note since agents may not infer this from `--by <id1> <id2> ...` syntax alone."
  - "In settings.json, Stop and SubagentStop are separate events. In agent frontmatter, Stop is auto-converted to SubagentStop for subagents. Use SubagentStop in settings.json for hooks that should fire when subagents finish."
  - "The `if` condition in settings.json hooks uses permission rule syntax: `Bash(trackgentic *)` matches after VAR=value stripping, so `TRACKGENTIC_TOKEN=... trackgentic list` correctly matches. Only evaluated for PreToolUse/PostToolUse/PostToolUseFailure/PermissionRequest/PermissionDenied events."
  - "Token enforcement reads from .trackgentic/users.json (not env var) — the enforce-trackgentic-token.ts hook uses agent_type to look up the agent's registered token, strips any manual token from the command, and injects the correct one. No env var needed; no agent runner changes needed. The $TRACKGENTIC_TOKEN constant in agent system files is informational only."
  - "Hook placement strategy: project-wide enforcement hooks (token injection, issue cleanup) go in settings.json so they apply to all agents automatically without per-agent config. Agent-specific hooks (access control, expertise injection) stay in agent frontmatter since they need per-agent configuration. This avoids duplicating hook config across every agent file."
  - "The enforce-issue-cleanup.ts SubagentStop hook uses both `reason` (shown to the agent) and `systemMessage` (shown to the user) in its block output. Both fields work for SubagentStop just like Stop."
  - "Agent runner orphan process risk: if run-agents.ts dies without SIGINT (e.g. piped through `head`, SIGPIPE), child claude processes become orphans (PPID 1) because the SIGINT handler never fires. These orphaned processes continue working on the same issue. Always check for orphaned claude agent processes before starting a new runner instance — duplicates will cause concurrent writes to the same trackgentic issue."
  - "Session logs (.agentic/session/*.jsonl) use stream-json format — parse with `json.loads(line)` per line. Key types: 'assistant' (agent messages/tool calls), 'tool' (tool results), 'result' (final session result with cost_usd, duration_ms, num_turns). Monitor tail of these files to track agent progress."
  - "Auto-promotion is dangerous for multi-phase flows: trackgentic auto-promotes parent status when children advance. This caused parent to go done before implementation tasks were created. The /issue skill now creates all tasks upfront to avoid needing re-engagement, but auto-promotion still causes cosmetic issues (parent marked done early). Library code should be updated to not auto-promote parent to done when children complete."
  - "Issue assignment is critical for agent runner dispatch: the runner only dispatches agents for issues assigned to them. If the parent issue is assigned to the user instead of the CTO, the CTO never gets dispatched and the flow stops. The /issue skill now always assigns the parent to cto."
  - "Deleted skills with dangling references are silently ignored — Claude Code doesn't error when a skill name in frontmatter doesn't match any SKILL.md. This means broken skill references go undetected. Always verify agent skill lists match existing skill directories after renames or deletions."

open_questions: []

resolved:
  - "FIXED: 2>&1 fd redirects were matching WRITE_BASH_PATTERNS — added negative lookahead (?!&\\d) to the redirection regex: />>?(?!&\\d)\\s*\\S/. Real file redirects (> file, >> file, 2>file, &>file) still caught; fd-to-fd redirects (2>&1, 1>&2) now pass through as read-only."
  - "RESOLVED: Specs location confirmed as .agentic/specs/ — used by library-developer for read access to project specifications"
  - "RESOLVED: Library code lives in packages/library/ — the library-developer agent has full read/write/delete access there"
  - "RESOLVED: Bash timeout configurable via env vars — BASH_DEFAULT_TIMEOUT_MS (default 2 min) and BASH_MAX_TIMEOUT_MS (default 10 min, the ceiling). Can be set via the `env` key in settings.json to apply to all sessions, or in shell profile before Claude Code starts. Project currently uses BASH_DEFAULT_TIMEOUT_MS=600000 (10 min) and BASH_MAX_TIMEOUT_MS=1800000 (30 min)."
  - "FIXED: Expertise injection for subagents — expertise.hook.ts now handles SessionStart event (primary injection point). Uses flag-based de-duplication: SessionStart writes flag + injects; UserPromptSubmit checks flag and skips if already injected. This ensures expertise is available from session start in both interactive and -p modes."
  - "FIXED: Stop hook not reliably firing for subagents — all expertise hooks (SessionStart, UserPromptSubmit, Stop) moved from settings.json to agent frontmatter. hire-expert template updated so new agents get hooks automatically."
  - "FIXED: library-quality agent Stop hook had typo in command path — expertence.hook.ts (missing 'i') → expertise.hook.ts. This caused the Stop hook to fail silently (bun couldn't find the file), so the agent never received expertise update reminders."
  - "REMOVED: Session/logging infrastructure from old delegate skill — no more _conversation.jsonl, agent_logs, CRYPLATIVE_SESSION_ID, or reference.md."
  - "REMOVED: Direct delegation via delegate skill — replaced by trackgentic-based task assignment. Managers create issues and assign them; the agent runner picks up issues and launches agents. Project-wide hooks enforce token usage and issue cleanup."
  - "FIXED: trackgentic SKILL.md CLI syntax was out of sync with actual CLI — missing init command, missing users section, missing --path option on create, blockages --by variadic syntax unclear, and workflow guidelines had 3 overlapping contradictory versions. Verified all commands against `--help` output and rewrote to match. Also added explicit note that `create` takes title as positional arg (not --title flag) since agents were hitting errors using --title."
  - "FIXED: Multi-phase flow failure — /issue skill only created review tasks, then stopped. CTO never re-engaged because (a) parent was assigned to user not cto, (b) auto-promotion marked parent done when reviews completed. Fix: /issue skill now creates ALL tasks upfront (reviews + implementation + quality) with blockages, assigns parent to cto. Consolidated worktask/trackgentic-manager/trackgentic-subordinate into trackgentic-implement + issue."
  - "FIXED: Broken skill references — agents referenced deleted skills (trackgentic-manager, trackgentic-subordinate, worktask) silently. Cleaned up all agents to use trackgentic-implement (all) + issue (CTO only). Deleted worktask skill directory."
