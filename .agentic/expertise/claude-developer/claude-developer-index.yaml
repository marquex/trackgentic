# Claude Developer Expertise Index
# Agent: claude-developer
# Domain: Claude Code extensions — agents, skills, hooks, configuration

project_overview:
  name: trackgentic
  type: Agentic infrastructure project
  description: Project building a multi-agent system using Claude Code's extension points
  claude_setup_root: .claude/

architecture:
  agents:
    path: .claude/agents/
    current_agents:
      - name: claude-developer
        model: opus
        description: Expert for developing Claude Code extensions (this agent)
        access: [.claude/**, .agentic/specs/engineering/**, .agentic/expertise/**]
        subordinates: none
        skills: [claude-developing, agent-expertise]
      - name: cto
        model: opus
        description: Chief Technology Officer — designs architecture, generates specs, tracks development alignment
        access: [.agentic/expertise/cto/**, ./**]
        subordinates: [library-developer, library-quality]
        skills: [agent-expertise, delegate, trackgentic, trackgentic-manager]
        hooks: [enforce-agent-access.ts, expertise.hook.ts (Stop)]
      - name: library-developer
        model: opus
        description: TypeScript library developer — owns all technical details of the npm-published library
        access: [.agentic/expertise/library-developer/**, packages/library/**, .agentic/specs/**]
        subordinates: none
        skills: [agent-expertise, trackgentic, trackgentic-subordinate]
        hooks: [enforce-agent-access.ts, expertise.hook.ts (Stop)]
        manager: cto
      - name: library-quality
        model: opus
        description: Library quality engineer — generates tests, verifies code quality, produces documentation for the library
        access: [.agentic/expertise/library-quality/**, packages/library/**, .agentic/specs/**]
        subordinates: none
        skills: [agent-expertise, trackgentic, trackgentic-subordinate]
        hooks: [enforce-agent-access.ts, expertise.hook.ts (Stop)]
        manager: cto
    notes: |
      hire-expert skill tested — workflow is: parse → ask → confirm → create → validate. Step-by-step approach works well.
      Second hire (library-developer) went smoothly — user provided complete info upfront, only changed model from sonnet to opus.
      Third hire (library-quality) — user again provided complete info upfront, changed model from sonnet to opus. This agent needs Write/Edit tools (creates test files and docs).
      CTO now has two subordinates — adding the second was simple since delegate skill and Delegation section already existed, just needed subordinates list update in frontmatter.

  skills:
    path: .claude/skills/
    current_skills:
      - name: claude-developing
        purpose: Access official Claude Code docs and custom conventions for extension development
        has_scripts: true
        scripts: [update-docs.ts]
        docs_cache: .claude/skills/claude-developing/docs/original/
        custom_docs: .claude/skills/claude-developing/docs/custom/
      - name: agent-expertise
        purpose: Teach agents how to manage long-term memory (expertise YAML files)
        has_scripts: true
        scripts: [expertise.hook.ts, yaml-validator.ts]
        hooks_registered_in: agent frontmatter only (SessionStart, UserPromptSubmit, Stop)
        injection_flow: SessionStart is primary injection point; UserPromptSubmit is fallback (skips if SessionStart already injected via flag check). Flag-based dedup handles double-firing gracefully.
        stop_flow: Stop hook in agent frontmatter fires reliably for all agent sessions including -p mode delegates. Handles both Stop and SubagentStop events.
      - name: hire-expert
        purpose: Create new expert agents with proper hierarchy, access rules, and expertise setup
        has_scripts: false
        notes: Template-based agent creation with hierarchy integration
      - name: delegate
        purpose: Delegate tasks to subordinate agents via claude CLI subprocess
        has_scripts: true
        scripts: [delegate.ts]
      - name: trackgentic
        purpose: Interact with the trackgentic issue tracker — create, list, view, update issues, comments, users, blockages
        has_scripts: false
        auth_mechanism: TRACKGENTIC_TOKEN env var prepended to every command — each agent has its own token
        notes: |
          Pure reference skill — no scripts, just CLI usage documentation.
          Each agent should be registered via `trackgentic users register <name>` to get their own token.
          Tokens should be stored in the agent's expertise files for reuse across sessions.
      - name: trackgentic-manager
        purpose: Issue flow for manager agents — triage, assign, monitor, unblock, review, close issues
        has_scripts: false
        notes: |
          Paired with the trackgentic base skill (CLI reference). This skill adds the orchestration workflow on top.
          Assigned to CTO agent. Subordinate agents get trackgentic-subordinate instead.
      - name: trackgentic-subordinate
        purpose: Issue flow for subordinate agents — pick up, execute, report, hand back issues
        has_scripts: false
        notes: |
          Paired with the trackgentic base skill (CLI reference). This skill adds the worker workflow on top.
          Assigned to library-developer and library-quality agents. Manager agents get trackgentic-manager instead.

  hooks:
    path: .claude/hooks/
    current_hooks:
      - name: enforce-agent-access.ts
        trigger: PreToolUse (Read|Write|Edit|MultiEdit|Bash)
        purpose: Enforce per-agent filesystem access from frontmatter + delegation hierarchy
        key_behaviors:
          - Main agent (no agent_type) is always allowed
          - No access block in agent file = deny (fail closed)
          - Validates delegation targets against subordinates list
          - Auto-allows agents reading their own agent file
          - Maps tools to verbs: Read/Grep/Glob=read, Write/Edit/MultiEdit/NotebookEdit=write
          - Bash commands classified by patterns (redirection, rm, cp, etc.)
      - name: inject-agent-markers.ts
        trigger: PostToolUse (after Read)
        purpose: Expand <!-- ACCESS_RULES --> and <!-- SUBORDINATES --> markers in agent files at runtime
        key_behaviors:
          - Only activates when Read tool reads a file in .claude/agents/
          - File on disk is NEVER modified — markers persist and expand in memory
          - Reads subordinate agent files to get descriptions for SUBORDINATES expansion
  settings:
    path: .claude/settings.json
    hooks_configured:
      PostToolUse: [inject-agent-markers.ts]
    permissions:
      allow: [Bash(bun .claude/hooks/*), Bash(bun .claude/skills/**), Write/Edit/MultiEdit on .claude/**]
    env:
      BASH_DEFAULT_TIMEOUT_MS: "600000"
      BASH_MAX_TIMEOUT_MS: "1800000"

  expertise_system:
    path: .agentic/expertise/{agent-name}/
    index_file: "{agent-name}-index.yaml"
    management_hook: expertise.hook.ts (in agent-expertise skill, wired in each agent's frontmatter)
    conventions:
      - YAML structured files, max 600 lines per file, max 300 chars per line
      - Validate with: bun yaml-validator (requires js-yaml dependency)
      - Index file injected at session start, update check at session stop

conventions:
  - All hooks use bun runtime (TypeScript, no build step)
  - Agent frontmatter uses custom YAML parser (no yaml dependency) in enforce-agent-access
  - Agent marker expansion (ACCESS_RULES, SUBORDINATES) never modifies files on disk
  - Skills with scripts have a scripts/ folder
  - Delegate script spawns `claude --agent <name> -p <prompt>` with stream-json output — this is a separate top-level process, NOT a subagent, so Stop fires (not SubagentStop)
  - Delegate script has no session/logging — it only spawns the child process, shows progress, and returns the text response
  - Stop hooks from settings.json don't reliably fire for `-p` mode agent sessions — all expertise hooks now defined in agent frontmatter only
  - Internal subagents (Agent tool / @-mention) only run frontmatter hooks — settings.json hooks don't fire inside them
  - Avoid MCP — prefer CLI tools via skills
  - Only one CLAUDE.md at project root, used as project overview not agent memory
  - Expert agents always get agent-expertise skill and PreToolUse hook for access enforcement
  - Agent hierarchy is a strict tree — delegation flows downward only

patterns:
  - hire-expert flow: parse user description → identify gaps → ask follow-ups → present summary → await explicit confirmation → create files → validate
  - For CTO-type roles: start with read-only repo access, add write folders when specs location is decided
  - Agent creation is multi-step — always confirm before writing files, user may adjust access or hierarchy
  - Users often override the default model (sonnet) — always present model in confirmation summary so it's visible and adjustable
  - Second hire (library-developer) — user provided all info upfront in a single description; only change was model (sonnet → opus). When user gives complete info, skip directly to confirmation step.
  - When adding first subordinate to a manager: add delegate skill, add subordinates list, add Delegation section with SUBORDINATES marker before Restricted domain section
  - When adding subsequent subordinates to a manager that already has delegate skill and Delegation section: just add to subordinates list in frontmatter — no structural changes needed
  - Agents that create files (tests, docs) need Write/Edit in their tools list — most expert agents are read-only but quality/doc agents are exceptions
  - Reference-only skills (no scripts): SKILL.md frontmatter just needs `name` and `description`, no `allowed-tools` or `argument-hint` needed. The body is purely instructional — teaches the agent how to use an external CLI tool, API, or convention. The trackgentic skill is the first example of this pattern.
  - Role-specific skill splitting: when a base skill has different workflows for different agent roles (e.g. manager vs subordinate), split each workflow into its own skill directory. The base skill holds the shared reference (CLI docs, auth, etc.) and each role skill holds the workflow instructions. Assign agents both the base skill and their role-specific skill. This keeps skill content focused and avoids agents loading irrelevant workflows.

gotchas:
  - No package.json in .claude/ directory — yaml-validator.ts imports js-yaml which needs install at runtime
  - yaml-validator.ts takes a directory path (not a file path) — it recursively finds all YAML files in the given directory
  - Expertise injection was only handled on UserPromptSubmit, not SessionStart — delegated subagents via delegate skill (claude -p) need SessionStart injection since that's the primary context injection point before the first prompt
  - Expertise hooks (SessionStart, UserPromptSubmit, Stop) live in agent frontmatter, NOT settings.json — settings.json hooks don't reliably fire for -p mode delegates
  - hire-expert skill template includes all three expertise hooks in the frontmatter — new agents get them automatically
  - "TYPOS IN HOOK COMMANDS ARE SILENTLY FATAL — if a hook command references a non-existent file, bun fails with a non-zero exit code, producing a 'hook error' notification. The hook never executes. Since there's no compile-time checking on command strings, always double-check paths after editing agent frontmatter hook commands."
  - "stop-hook-error notification appears in --verbose stream-json output for ALL agents when their Stop hook returns decision: block — this is normal Claude Code behavior, not a bug. The hook works correctly (feedback is passed, agent continues), but the notification is always emitted."

open_questions: []

resolved:
  - "FIXED: 2>&1 fd redirects were matching WRITE_BASH_PATTERNS — added negative lookahead (?!&\\d) to the redirection regex: />>?(?!&\\d)\\s*\\S/. Real file redirects (> file, >> file, 2>file, &>file) still caught; fd-to-fd redirects (2>&1, 1>&2) now pass through as read-only."
  - "RESOLVED: Specs location confirmed as .agentic/specs/ — used by library-developer for read access to project specifications"
  - "RESOLVED: Library code lives in packages/library/ — the library-developer agent has full read/write/delete access there"
  - "RESOLVED: Bash timeout configurable via env vars — BASH_DEFAULT_TIMEOUT_MS (default 2 min) and BASH_MAX_TIMEOUT_MS (default 10 min, the ceiling). Can be set via the `env` key in settings.json to apply to all sessions, or in shell profile before Claude Code starts. Project currently uses BASH_DEFAULT_TIMEOUT_MS=600000 (10 min) and BASH_MAX_TIMEOUT_MS=1800000 (30 min)."
  - "FIXED: Expertise injection for delegated subagents — expertise.hook.ts now handles SessionStart event (primary injection point). Uses flag-based de-duplication: SessionStart writes flag + injects; UserPromptSubmit checks flag and skips if already injected. This ensures expertise is available from session start in both interactive and -p (delegated) modes."
  - "FIXED: Stop hook not reliably firing for delegated agents — all expertise hooks (SessionStart, UserPromptSubmit, Stop) moved from settings.json to agent frontmatter. hire-expert template updated so new agents get hooks automatically."
  - "FIXED: library-quality agent Stop hook had typo in command path — expertence.hook.ts (missing 'i') → expertise.hook.ts. This caused the Stop hook to fail silently (bun couldn't find the file), so the agent never received expertise update reminders."
  - "REMOVED: Session/logging infrastructure from delegate skill — no more _conversation.jsonl, agent_logs, CRYPLATIVE_SESSION_ID, or reference.md. Delegate script now only spawns the child process, tracks progress, and returns the text response."
